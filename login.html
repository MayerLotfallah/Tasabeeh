<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Tasabeeh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: whitesmoke;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { color: darkslategray; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0076a3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover { background-color: #005c80; }
        .error { color: red; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <div class="error" id="error-msg">Incorrect username or password!</div>
    <form id="login-form">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value;
    const errorMsg = document.getElementById("error-msg");

    if (user === "admin" && pass === "123") {

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", user);
        
        window.location.href = "app.html"; 
    } else {
        errorMsg.style.display = "block";
    }
});
</script>

</body>
</html>
