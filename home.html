    <script>
        const container = document.querySelector('.card-container');
        if (container) { container.addEventListener('wheel', (e) => { e.preventDefault(); container.scrollLeft += e.deltaY; }); }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.action === 'filterCards') {
                const query = event.data.query.toLowerCase().trim();
                const cards = document.querySelectorAll(".card-container .card:not(.see-all-card)");
                cards.forEach(card => {
                    const name = card.querySelector("h3") ? card.querySelector("h3").textContent.toLowerCase() : "";
                    card.style.display = name.includes(query) ? "" : "none";
                });
                const seeAll = document.querySelector(".see-all-card");
                if (seeAll) seeAll.style.display = query === "" ? "" : "none";
            }
        });


        function requestNewPlaylist() {
            window.parent.postMessage({ action: 'triggerPlaylistCreation' }, '*');
        }


        function openPage(page) {
    window.parent.document
        .getElementById("content-frame")
        .src = page;
}

document.querySelectorAll(".card[href]").forEach(card => {
    const href = card.getAttribute("href");

    if (
        href &&
        href !== "#" &&
        !href.startsWith("http") &&
        !href.startsWith("javascript:")
    ) {
        card.addEventListener("click", function(e) {
            e.preventDefault();
            openPage(href);
        });
    }
});
    </script>
